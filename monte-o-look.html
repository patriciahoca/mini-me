<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monte o Look</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #mobile-redirect {
      display: none;
      position: fixed;
      inset: 0;
      background: #60748c;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-family: sans-serif;
      z-index: 9999;
    }
    #mobile-redirect h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    #mobile-redirect p  { font-size: 1rem; opacity: 0.85; line-height: 1.6; }
    #mobile-redirect a  {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #fff;
      color: #60748c;
      border-radius: 2rem;
      font-weight: bold;
      text-decoration: none;
    }

    html, body {
      width: 100%; height: 100%;
      background: #60748c;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>

<div id="mobile-redirect">
  <h1>✨ Monte o Look</h1>
  <p>Este jogo foi feito para ser jogado no computador.<br>Acesse pelo desktop para a experiência completa!</p>
  <a href="https://seusite.com">Ir para o site</a>
</div>

<canvas id="game"></canvas>

<script>
  // ── Detecção de mobile ──────────────────────────────────────────
  function isMobile() {
    return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || window.innerWidth < 768;
  }

  if (isMobile()) {
    document.getElementById("mobile-redirect").style.display = "flex";
    document.getElementById("game").style.display = "none";
    // Opcional: redirecionar automaticamente após 3s
    // setTimeout(() => { window.location.href = "https://seusite.com"; }, 3000);
  }

  // ── Assets ──────────────────────────────────────────────────────
  const FUNDO  = "assets/BG.png";
  const BONECA = "assets/Bonequinha.png";
  const ITEMS  = [
    "assets/roupa2.png",
    "assets/roupa.png",
    "assets/roupa%20leia.png",
    "assets/saia.png",
    "assets/allstar.png",
    "assets/sapato.png",
    "assets/cabelo.png",
    "assets/cabelo%20leia.png",
    "assets/oculos%20verdes.png",
    "assets/oculos%20oncinha.png",
    "assets/tv.png",
    "assets/livro.png",
    "assets/bola.png",
    "assets/bola%20tenis.png",
    "assets/bolsa.png",
    "assets/cafe.png",
    "assets/cha.png",
    "assets/cervejinha.png",
    "assets/natacao.png",
    "assets/partitura.png",
    "assets/quadro.png",
  ];

  const canvas = document.getElementById("game");
  const ctx    = canvas.getContext("2d");

  let fundoImg  = null;
  let bonecaImg = null;
  const imgs    = [];
  let maxZ      = 0;
  let drag      = null;

  function loadImg(src) {
    return new Promise(res => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => res(img);
      img.src = src;
    });
  }

  function buildCache(img) {
    try {
      const c = document.createElement("canvas");
      c.width  = img.naturalWidth;
      c.height = img.naturalHeight;
      const cx = c.getContext("2d");
      cx.drawImage(img, 0, 0);
      const d = cx.getImageData(0, 0, c.width, c.height);
      return { data: d.data, w: c.width, h: c.height };
    } catch { return null; }
  }

  function getAlpha(cache, lx, ly, cw, ch) {
    if (!cache) return 255;
    const ix = Math.round((lx / cw) * cache.w);
    const iy = Math.round((ly / ch) * cache.h);
    if (ix < 0 || ix >= cache.w || iy < 0 || iy >= cache.h) return 0;
    return cache.data[(iy * cache.w + ix) * 4 + 3];
  }

  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (fundoImg)  ctx.drawImage(fundoImg,  0, 0, w, h);
    if (bonecaImg) ctx.drawImage(bonecaImg, 0, 0, w, h);
    [...imgs]
      .sort((a, b) => a.z - b.z)
      .forEach(item => ctx.drawImage(item.img, item.x, item.y, w, h));
  }

  function resize() {
    if (!fundoImg) return;
    const aspect = fundoImg.naturalWidth / fundoImg.naturalHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    const w  = Math.min(vw, vh * aspect);
    const h  = w / aspect;
    canvas.style.width  = w + "px";
    canvas.style.height = h + "px";
    canvas.width  = Math.round(w);
    canvas.height = Math.round(h);
    draw();
  }

  // ── Controle de drag — FIX: preventDefault só quando necessário ──
  let pointerInsideCanvas = false;

  canvas.addEventListener("pointerdown", e => {
    const r  = canvas.getBoundingClientRect();
    const sx = canvas.width  / r.width;
    const sy = canvas.height / r.height;
    const px = (e.clientX - r.left) * sx;
    const py = (e.clientY - r.top)  * sy;
    const w  = canvas.width, h = canvas.height;

    const sorted = imgs
      .map((item, idx) => ({ item, idx }))
      .sort((a, b) => b.item.z - a.item.z);

    let hitItem = false;
    for (const { item, idx } of sorted) {
      if (getAlpha(item.cache, px - item.x, py - item.y, w, h) > 30) {
        item.z = ++maxZ;
        drag = { idx, sx: e.clientX, sy: e.clientY, ox: item.x, oy: item.y };
        canvas.style.cursor = "grabbing";
        draw();
        hitItem = true;
        break;
      }
    }

    // Só bloqueia scroll se clicou em um item arrastável
    if (hitItem) {
      e.preventDefault();
    }
  }, { passive: false });

  window.addEventListener("pointermove", e => {
    if (!drag) return;
    e.preventDefault(); // Bloqueia scroll apenas durante drag ativo
    const r  = canvas.getBoundingClientRect();
    const sc = canvas.width / r.width;
    const item = imgs[drag.idx];
    item.x = drag.ox + (e.clientX - drag.sx) * sc;
    item.y = drag.oy + (e.clientY - drag.sy) * sc;
    draw();
  }, { passive: false });

  window.addEventListener("pointerup", () => {
    drag = null;
    canvas.style.cursor = "grab";
  });

  window.addEventListener("resize", resize);

  Promise.all([
    loadImg(FUNDO).then(img  => { fundoImg  = img; }),
    loadImg(BONECA).then(img => { bonecaImg = img; }),
    ...ITEMS.map((src, i) =>
      loadImg(src).then(img => {
        imgs[i] = { img, cache: buildCache(img), x: 0, y: 0, z: i };
      })
    ),
  ]).then(() => {
    maxZ = ITEMS.length;
    resize();
  });
</script>
</body>
</html>
